name: VibeSec CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vibesec-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  self-scan-minimal:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository without credentials
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install checksum-verified Minimal scanners
        run: scripts/install_tools.sh . .tools/bin
      - name: Run Minimal against VibeSec
        env:
          VIBESEC_ENFORCEMENT: observe
          VIBESEC_MIN_SEVERITY: high
        run: scripts/run_minimal_profile.sh . self-scan-minimal
      - name: Validate Minimal self-scan artifacts and states
        run: >-
          python3 scripts/validate_security_artifacts.py --profile minimal --results self-scan-minimal
          --expect-state trivy=ran --expect-state gitleaks=ran --expect-state actionlint=ran

  self-scan-standard:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository without credentials
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install pinned validation dependency
        run: python3 -m pip install --disable-pip-version-check --requirement requirements.txt
      - name: Install checksum and signature-verified scanners
        run: |
          scripts/install_tools.sh . .tools/bin
          scripts/install_standard_tools.sh . .tools/bin
      - name: Exercise pinned Checkov container fixtures
        run: python3 scripts/test_checkov_container.py
      - name: Run Standard against VibeSec
        id: standard
        env:
          VIBESEC_ENFORCEMENT: observe
          VIBESEC_MIN_SEVERITY: high
        run: |
          set +e
          python3 scripts/run_standard_profile.py . self-scan-standard --vibesec-root . --tool-dir .tools/bin
          scan_exit=$?
          set -e
          case "$scan_exit" in
            0|1|2|3) ;;
            *) scan_exit=3 ;;
          esac
          mkdir -p self-scan-standard
          exit_file="$(mktemp self-scan-standard/.scan-exit-code.XXXXXX)"
          printf '%s\n' "$scan_exit" > "$exit_file"
          mv "$exit_file" self-scan-standard/scan-exit-code.txt
          echo "exit_code=${scan_exit}" >> "$GITHUB_OUTPUT"
      - name: Validate Standard self-scan artifacts and exact states
        if: always() && steps.standard.outcome != 'skipped'
        run: >-
          python3 scripts/validate_security_artifacts.py --profile standard --results self-scan-standard
          --expect-state opengrep=ran --expect-state osv-scanner=ran --expect-state syft=ran
          --expect-state checkov=ran --expect-state trivy=ran --expect-state gitleaks=ran
          --expect-state actionlint=ran --expect-state trivy-image=not_configured
      - name: Preserve Standard scan exit contract
        if: always() && steps.standard.outcome != 'skipped'
        run: python3 scripts/preserve_scan_exit.py self-scan-standard/scan-exit-code.txt

  scanner-accountability:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out trusted fixture and expectation data
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install pinned validation dependency
        run: python3 -m pip install --disable-pip-version-check --requirement requirements.txt
      - name: Generate and validate controlled fixture evidence
        run: |
          mkdir accountability
          python3 scripts/run_security_accountability.py --output accountability/evidence.json
          python3 scripts/validate_security_capabilities.py --evidence accountability/evidence.json
      - name: Exercise all current Opengrep rules with the pinned scanner
        run: |
          scripts/install_standard_tools.sh . .tools/bin
          python3 scripts/test_opengrep_rules.py .tools/bin/opengrep

  security-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out trusted harness tests
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install pinned validation dependency
        run: python3 -m pip install --disable-pip-version-check --requirement requirements.txt
      - name: Run artifact, failure-path, fork, and trust-boundary regressions
        run: >-
          python3 -m unittest -v tests.test_security_accountability tests.test_minimal_profile_integration
          tests.test_standard_profile_integration tests.test_scan_exit tests.test_workflows tests.test_policy tests.test_results

  validate:
    needs: [self-scan-minimal, self-scan-standard, scanner-accountability, security-artifacts]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2, verified 2026-07-21
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install pinned Python validation dependency
        run: python3 -m pip install --disable-pip-version-check --requirement requirements.txt
      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v
      - name: Validate repository configuration
        run: python3 scripts/validate_repository.py
      - name: Build and verify reproducible consumer bundle
        run: |
          bundle_dir="$(mktemp -d)"
          trap 'rm -rf "${bundle_dir}"' EXIT
          python3 scripts/build_consumer_bundle.py --output "${bundle_dir}/first.zip" --json > "${bundle_dir}/build-first.json"
          python3 scripts/build_consumer_bundle.py --output "${bundle_dir}/second.zip" --json > "${bundle_dir}/build-second.json"
          cmp "${bundle_dir}/first.zip" "${bundle_dir}/second.zip"
          python3 scripts/verify_consumer_bundle.py "${bundle_dir}/first.zip" --json > "${bundle_dir}/verify.json"
          mkdir "${bundle_dir}/minimal"
          python3 scripts/init_vibesec.py --bundle "${bundle_dir}/first.zip" --profile minimal --target "${bundle_dir}/minimal" --write > "${bundle_dir}/init.json"
          python3 scripts/verify_installation.py --target "${bundle_dir}/minimal" --json > "${bundle_dir}/installation.json"
          python3 scripts/vibesec_doctor.py --target "${bundle_dir}/minimal" --json > "${bundle_dir}/doctor.json"
          set +e
          python3 scripts/plan_vibesec_upgrade.py --target "${bundle_dir}/minimal" --bundle "${bundle_dir}/first.zip" --json > "${bundle_dir}/upgrade.json"
          upgrade_status=$?
          set -e
          test "${upgrade_status}" -eq 1
          python3 -m json.tool "${bundle_dir}/build-first.json" >/dev/null
          python3 -m json.tool "${bundle_dir}/verify.json" >/dev/null
          python3 -m json.tool "${bundle_dir}/installation.json" >/dev/null
          python3 -m json.tool "${bundle_dir}/doctor.json" >/dev/null
          python3 -m json.tool "${bundle_dir}/upgrade.json" >/dev/null
      - name: Validate source syntax and static data formats
        run: |
          syntax_cache="$(mktemp -d)"
          trap 'rm -rf "${syntax_cache}"' EXIT
          PYTHONPYCACHEPREFIX="${syntax_cache}" python3 -m compileall -q scripts tests
          find . -type f -name '*.json' -not -path './.git/*' -print0 | xargs -0 -n1 python3 -m json.tool >/dev/null
          python3 -c 'import pathlib,tomllib; [tomllib.loads(path.read_text(encoding="utf-8")) for path in pathlib.Path(".").rglob("*.toml")]'
          find scripts -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
      - name: Validate local Opengrep rules
        run: python3 scripts/validate_opengrep_rules.py
      - name: Validate the bundled AppSec Guardian skill
        run: python3 scripts/validate_skill.py skills/appsec-guardian
      - name: Validate YAML syntax
        run: >-
          find . -type f \( -name '*.yml' -o -name '*.yaml' \) -print0 |
          xargs -0 ruby -e 'require "yaml"; ARGV.each { |path| YAML.safe_load(File.read(path), permitted_classes: [], permitted_symbols: [], aliases: false, filename: path) }' --
      - name: Install checksum-verified scanners
        run: scripts/install_tools.sh . .tools/bin
      - name: Install signature and checksum-verified Standard scanners
        run: scripts/install_standard_tools.sh . .tools/bin
      - name: Exercise local Opengrep rules
        run: python3 scripts/test_opengrep_rules.py .tools/bin/opengrep
      - name: Lint repository and starter workflows
        run: .tools/bin/actionlint -no-color .github/workflows/ci.yml templates/github-actions/security-baseline.yml templates/github-actions/security-standard.yml
      - name: Run minimal profile in observation mode
        id: security
        continue-on-error: true
        env:
          VIBESEC_ENFORCEMENT: observe
          VIBESEC_MIN_SEVERITY: high
        run: scripts/run_minimal_profile.sh . results
      - name: Upload security results
        if: always() && steps.security.outcome != 'skipped'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2, verified 2026-07-21
        with:
          name: vibesec-results-${{ github.run_id }}
          path: |
            results/normalized.json
            results/report.md
            results/coverage.json
            results/policy-result.json
          if-no-files-found: error
          retention-days: 14
      - name: Fail when scanner execution failed
        if: steps.security.outcome == 'failure'
        env:
          SECURITY_OUTCOME: ${{ steps.security.outcome }}
        run: |
          echo "The security profile did not complete successfully (${SECURITY_OUTCOME})."
          exit 1
