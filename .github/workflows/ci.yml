name: VibeSec CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vibesec-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v
      - name: Install checksum-verified scanners
        run: scripts/install_tools.sh . .tools/bin
      - name: Run minimal profile in observation mode
        id: security
        continue-on-error: true
        env:
          VIBESEC_ENFORCEMENT: observe
          VIBESEC_MIN_SEVERITY: high
        run: scripts/run_minimal_profile.sh . results
      - name: Upload security results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vibesec-results-${{ github.run_id }}
          path: |
            results/normalized.json
            results/report.md
          if-no-files-found: error
          retention-days: 14
      - name: Fail when scanner execution failed
        if: steps.security.outcome == 'failure'
        env:
          SECURITY_OUTCOME: ${{ steps.security.outcome }}
        run: |
          echo "The security profile did not complete successfully (${SECURITY_OUTCOME})."
          exit 1
