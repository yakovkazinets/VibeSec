name: DAST integration accountability

on:
  workflow_dispatch:
  schedule:
    - cron: "41 5 * * 2"

permissions:
  contents: read

concurrency:
  group: vibesec-dast-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dast-integration-accountability:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the trusted controlled fixture without credentials
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install pinned validation dependency
        run: python3 -m pip install --disable-pip-version-check --requirement requirements.txt
      - name: Exercise pinned ZAP only against the controlled internal HTTP fixture
        run: python3 scripts/test_dast_container.py
