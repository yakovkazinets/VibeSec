name: Security Baseline

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-baseline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  minimal-profile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository without persisted credentials
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2, verified 2026-07-21
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install checksum-verified scanners
        run: scripts/install_tools.sh . .tools/bin
      - name: Scan and evaluate results
        id: security
        continue-on-error: true
        env:
          # Start with observe. After reviewing baseline.json, choose new or all.
          VIBESEC_ENFORCEMENT: observe
          VIBESEC_MIN_SEVERITY: high
        run: scripts/run_minimal_profile.sh . results
      - name: Write human-readable summary
        if: always()
        run: |
          if [[ -f results/report.md ]]; then
            sed -E 's/([A-Za-z0-9_=-]{20,})/[redacted]/g' results/report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "VibeSec did not generate a report; treat this run as a tool failure." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Retain machine-readable and human-readable reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2, verified 2026-07-21
        with:
          name: security-baseline-${{ github.run_id }}
          path: |
            results/normalized.json
            results/report.md
          if-no-files-found: error
          retention-days: 14
      - name: Preserve policy and tool failure status
        if: steps.security.outcome == 'failure'
        env:
          SECURITY_OUTCOME: ${{ steps.security.outcome }}
        run: |
          echo "Security evaluation failed (${SECURITY_OUTCOME}); inspect the retained report."
          exit 1
