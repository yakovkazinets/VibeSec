name: Security Standard

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "41 3 * * 1"
  workflow_dispatch:
    inputs:
      image_reference:
        description: Optional prebuilt image pinned as registry/name@sha256:digest
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: security-standard-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  standard-profile:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository without persisted credentials
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Initialize isolated scanner paths
        run: |
          echo "VIBESEC_ROOT=$RUNNER_TEMP/vibesec-trusted" >> "$GITHUB_ENV"
          echo "VIBESEC_RESULTS=$RUNNER_TEMP/vibesec-results" >> "$GITHUB_ENV"
          echo "VIBESEC_TOOLS=$RUNNER_TEMP/vibesec-tools" >> "$GITHUB_ENV"
      - name: Materialize trusted scanner harness from the base revision
        env:
          TRUSTED_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.sha }}
        run: |
          mkdir -p "$VIBESEC_ROOT"
          git archive "$TRUSTED_SHA" scripts config policy rules | tar -x -C "$VIBESEC_ROOT"
      - name: Install pinned VibeSec parser dependency
        run: python3 -m pip install --disable-pip-version-check PyYAML==6.0.3
      - name: Install checksum-verified scanners
        run: |
          "$VIBESEC_ROOT/scripts/install_tools.sh" "$VIBESEC_ROOT" "$VIBESEC_TOOLS"
          "$VIBESEC_ROOT/scripts/install_standard_tools.sh" "$VIBESEC_ROOT" "$VIBESEC_TOOLS"
      - name: Scan without building or installing project dependencies
        id: security
        continue-on-error: true
        env:
          VIBESEC_ENFORCEMENT: observe
          VIBESEC_MIN_SEVERITY: high
          VIBESEC_NETWORK_MODE: online
          VIBESEC_IMAGE_REFERENCE: ${{ github.event_name != 'pull_request' && inputs.image_reference || '' }}
        run: >-
          python3 "$VIBESEC_ROOT/scripts/run_standard_profile.py" . "$VIBESEC_RESULTS"
          --vibesec-root "$VIBESEC_ROOT" --tool-dir "$VIBESEC_TOOLS"
      - name: Write human-readable summary
        if: always()
        run: |
          if [[ -f "$VIBESEC_RESULTS/report.md" ]]; then
            sed -E 's/([A-Za-z0-9_=-]{20,})/[redacted]/g' "$VIBESEC_RESULTS/report.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "VibeSec did not generate a report; treat this run as a tool failure." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Retain required normalized results and coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: security-standard-report-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/vibesec-results/normalized.json
            ${{ runner.temp }}/vibesec-results/coverage.json
            ${{ runner.temp }}/vibesec-results/inventory.json
            ${{ runner.temp }}/vibesec-results/report.md
          if-no-files-found: error
          retention-days: 14
      - name: Check for a complete validated SBOM pair
        if: always()
        id: sbom
        run: |
          if [[ -f "$VIBESEC_RESULTS/sbom.cyclonedx.json" && -f "$VIBESEC_RESULTS/sbom.spdx.json" ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          elif [[ -e "$VIBESEC_RESULTS/sbom.cyclonedx.json" || -e "$VIBESEC_RESULTS/sbom.spdx.json" ]]; then
            echo "VibeSec produced an incomplete SBOM pair." >&2
            exit 1
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Retain validated SBOMs
        if: always() && steps.sbom.outputs.present == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: security-standard-sbom-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/vibesec-results/sbom.cyclonedx.json
            ${{ runner.temp }}/vibesec-results/sbom.spdx.json
          if-no-files-found: error
          retention-days: 14
      - name: Preserve policy and tool failure status
        if: steps.security.outcome == 'failure'
        env:
          SECURITY_OUTCOME: ${{ steps.security.outcome }}
        run: |
          echo "Security evaluation failed (${SECURITY_OUTCOME}); inspect the retained report."
          exit 1
